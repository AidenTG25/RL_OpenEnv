# Keep in sync with submission_review/openenv.yaml
# Hackathon Phase 2 often scans the Git repo root only — there was no openenv.yaml here before.
spec_version: 1
name: pr-review-env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  Pull-request review curriculum: agents read PR title, description, and diff,
  report bugs, severity, and fixes. Each task is graded by a programmatic rubric
  in environment.PRReviewEnvironment (issue match, severity, fix quality).

graders:
  - task_id: age-validation
    enabled: true
  - task_id: discount-calculation
    enabled: true
  - task_id: login-endpoint
    enabled: true
  - task_id: dashboard-cache
    enabled: true

tasks:
  - id: age-validation
    name: Age validation boundary
    difficulty: easy
    max_steps: 1
    reward_range: [0.01, 0.99]
    grader:
      enabled: true
      type: programmatic
      implementation: environment.PRReviewEnvironment._grade

  - id: discount-calculation
    name: Discount and bulk pricing
    difficulty: medium
    max_steps: 1
    reward_range: [0.01, 0.99]
    grader:
      enabled: true
      type: programmatic
      implementation: environment.PRReviewEnvironment._grade

  - id: login-endpoint
    name: Login endpoint security review
    difficulty: hard
    max_steps: 1
    reward_range: [0.01, 0.99]
    grader:
      enabled: true
      type: programmatic
      implementation: environment.PRReviewEnvironment._grade

  - id: dashboard-cache
    name: Dashboard cache tenant scoping
    difficulty: hard
    max_steps: 1
    reward_range: [0.01, 0.99]
    grader:
      enabled: true
      type: programmatic
      implementation: environment.PRReviewEnvironment._grade

curriculum:
  name: pr-review-curriculum
  tasks:
    - id: age-validation
      grader:
        enabled: true
    - id: discount-calculation
      grader:
        enabled: true
    - id: login-endpoint
      grader:
        enabled: true
    - id: dashboard-cache
      grader:
        enabled: true

grading:
  mode: programmatic
  min_tasks_with_grader: 3
  tasks_with_graders:
    - age-validation
    - discount-calculation
    - login-endpoint
    - dashboard-cache
